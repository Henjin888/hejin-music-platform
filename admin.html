<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - XMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#000000] text-white">
    <div class="flex h-screen">
        <aside class="w-64 bg-[#000000] flex flex-col p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 bg-[#1DB954] rounded-full flex items-center justify-center">
                    <i class="fas fa-music text-black"></i>
                </div>
                <span class="text-2xl font-bold">XMUSIC</span>
            </div>
            
            <nav class="flex flex-col gap-2">
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-lg text-white bg-[#282828]">
                    <i class="fas fa-chart-line w-6"></i><span>概览</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] hover:text-white hover:bg-white/10">
                    <i class="fas fa-users w-6"></i><span>用户管理</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] hover:text-white hover:bg-white/10">
                    <i class="fas fa-project-diagram w-6"></i><span>项目管理</span>
                </a>
                <a href="#" class="flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] hover:text-white hover:bg-white/10">
                    <i class="fas fa-shield-alt w-6"></i><span>KYC审核</span>
                </a>
            </nav>
        </aside>

        <main class="flex-1 bg-[#121212] rounded-lg m-2 p-8">
            <h1 class="text-2xl font-bold mb-6">管理仪表盘</h1>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-[#181818] rounded-lg p-6">
                    <div class="text-[#b3b3b3] text-sm">总用户数</div>
                    <div class="text-3xl font-bold">12,456</div>
                </div>
                <div class="bg-[#181818] rounded-lg p-6">
                    <div class="text-[#b3b3b3] text-sm">活跃项目</div>
                    <div class="text-3xl font-bold">86</div>
                </div>
                <div class="bg-[#181818] rounded-lg p-6">
                    <div class="text-[#b3b3b3] text-sm">总投资额</div>
                    <div class="text-3xl font-bold text-[#1DB954]">$2.8M</div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
