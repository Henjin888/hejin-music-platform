    <script src="../public/js/xmusic.js"></script>
    <script src="../public/js/security-utils.js"></script>
    <script>
        function showFilter() {
            document.getElementById('filterModal').classList.remove('hidden');
            document.getElementById('filterModal').classList.add('flex');
        }
        function hideFilter() {
            document.getElementById('filterModal').classList.add('hidden');
            document.getElementById('filterModal').classList.remove('flex');
        }
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => {
                    t.classList.remove('active', 'bg-[#1DB954]', 'text-black');
                    t.classList.add('bg-white/10', 'text-white/70');
                });
                this.classList.add('active', 'bg-[#1DB954]', 'text-black');
                this.classList.remove('bg-white/10', 'text-white/70');
            });
        });
    </script>
