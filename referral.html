<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推荐计划 - XMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-[#000000] text-white overflow-hidden">
    <div class="flex h-screen">
        <!-- 左侧导航栏 -->
        <aside class="w-64 bg-[#000000] flex flex-col p-6 gap-6">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">

                    <i class="fas fa-music text-black text-lg"></i>
                </div>
                <span class="text-2xl font-bold">XMUSIC</span>
            </div>

            <nav class="flex flex-col gap-2">
                <a href="index.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">
                    <i class="fas fa-home text-xl w-6"></i>
                    <span>首页</span>
                </a>
                <a href="discover.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">
                    <i class="fas fa-compass text-xl w-6"></i>
                    <span>发现</span>
                </a>
                <a href="map.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">

                    <span>附近音乐人</span>
                </a>
            </nav>

            <div class="h-px bg-[#282828]"></div>

            <nav class="flex flex-col gap-2">
                <a href="dashboard.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">
                    <i class="fas fa-book text-xl w-6"></i>
                    <span>我的投资</span>
                </a>
                <a href="referral.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-white font-semibold transition-colors bg-[#282828]">
                    <i class="fas fa-gift text-xl w-6"></i>
                    <span>推荐计划</span>
                </a>
                <a href="create.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">

                    <span>发起融资</span>
                </a>
            </nav>

            <div class="mt-auto space-y-2">
                <button onclick="showCurrencyModal()" class="flex items-center gap-3 px-4 py-3 text-[#b3b3b3] hover:text-white transition-colors w-full">
                    <i class="fas fa-dollar-sign"></i>
                    <span id="currentCurrency">USD</span>
                </button>
                <button onclick="showLangModal()" class="flex items-center gap-3 px-4 py-3 text-[#b3b3b3] hover:text-white transition-colors w-full">
                    <i class="fas fa-globe"></i>
                    <span>语言: 中文</span>
                </button>
            </div>
        </aside>

        <!-- 货币选择弹窗 -->
        <div id="currencyModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
            <div class="bg-[#181818] rounded-2xl p-6 max-w-sm w-full mx-4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">选择货币</h2>
                    <button onclick="closeCurrencyModal()" class="text-[#b3b3b3] hover:text-white"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setCurrency('USD')" class="currency-btn bg-[#1DB954] text-black py-3 px-4 rounded-lg font-semibold" data-currency="USD">USD $</button>
                    <button onclick="setCurrency('CNY')" class="currency-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-currency="CNY">CNY ¥</button>
                    <button onclick="setCurrency('EUR')" class="currency-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-currency="EUR">EUR €</button>
                    <button onclick="setCurrency('GBP')" class="currency-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-currency="GBP">GBP £</button>
                    <button onclick="setCurrency('JPY')" class="currency-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-currency="JPY">JPY ¥</button>
                    <button onclick="setCurrency('KRW')" class="currency-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-currency="KRW">KRW ₩</button>
                </div>
            </div>
        </div>

        <!-- 语言选择弹窗 -->
        <div id="langModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
            <div class="bg-[#181818] rounded-2xl p-6 max-w-md w-full mx-4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">选择语言</h2>
                    <button onclick="closeLangModal()" class="text-[#b3b3b3] hover:text-white"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="setLanguage('zh')" class="lang-btn bg-[#1DB954] text-black py-3 px-4 rounded-lg font-semibold" data-lang="zh">简体中文</button>
                    <button onclick="setLanguage('zht')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="zht">繁體中文</button>
                    <button onclick="setLanguage('en')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="en">English</button>
                    <button onclick="setLanguage('ja')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="ja">日本語</button>
                    <button onclick="setLanguage('ko')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="ko">한국어</button>
                    <button onclick="setLanguage('es')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="es">Español</button>
                    <button onclick="setLanguage('fr')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="fr">Français</button>
                    <button onclick="setLanguage('de')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="de">Deutsch</button>
                    <button onclick="setLanguage('pt')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="pt">Português</button>
                    <button onclick="setLanguage('ru')" class="lang-btn bg-[#282828] text-white py-3 px-4 rounded-lg hover:bg-[#383838]" data-lang="ru">Русский</button>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <main class="flex-1 bg-[#121212] rounded-lg m-2 overflow-hidden flex flex-col">
            <!-- 顶部栏 -->
            <header class="flex items-center justify-between px-8 py-4 bg-[#070707]">
                <h1 class="text-2xl font-bold">推荐计划</h1>
                
                <button onclick="window.location.href='login.html'" class="bg-[#1DB954] text-black px-6 py-2 rounded-full font-bold hover:scale-105 transition-transform">
                    连接钱包
                </button>
            </header>

            <!-- 可滚动内容 -->
            <div class="flex-1 overflow-y-auto px-8 py-8">
                
                <!-- 统计卡片 -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-[#181818] rounded-lg p-6 card-hover">
                        <div class="text-[#b3b3b3] text-sm mb-1">总推荐数</div>
                        <div class="text-3xl font-bold">48</div>
                    </div>
                    
                    <div class="bg-[#181818] rounded-lg p-6 card-hover">

                        <div class="text-3xl font-bold text-[#1DB954]">32</div>
                    </div>
                    
                    <div class="bg-[#181818] rounded-lg p-6 card-hover">
                        <div class="text-[#b3b3b3] text-sm mb-1">总佣金</div>
                        <div class="text-3xl font-bold text-[#1DB954]">$1,280</div>
                    </div>
                    
                    <div class="bg-[#181818] rounded-lg p-6 card-hover">
                        <div class="text-[#b3b3b3] text-sm mb-1">佣金比例</div>
                        <div class="text-3xl font-bold">3%</div>
                        <div class="text-xs text-[#666]">Pro 等级</div>
                    </div>
                </div>

                <div class="grid lg:grid-cols-3 gap-8">
                    <!-- 左侧主要内容 -->
                    <div class="lg:col-span-2 space-y-6">
                        
                        <!-- 推荐链接 -->
                        <div class="bg-[#181818] rounded-lg p-6">
                            <h2 class="text-xl font-bold mb-4">你的推荐链接</h2>
                            
                            <div class="bg-[#242424] rounded-lg p-4 mb-4">
                                <div class="flex gap-2">
                                    <input type="text" value="https://xmusic.finance/r/ABC123XYZ" readonly 
                                        class="flex-1 bg-[#181818] text-white px-4 py-3 rounded-lg text-sm"
                                    >
                                    
                                    <button onclick="copyLink()" class="bg-[#1DB954] text-black px-6 py-3 rounded-lg font-semibold hover:opacity-90 transition-opacity">
                                        <i class="fas fa-copy mr-2"></i>复制
                                    </button>
                                </div>
                            </div>

                            <div class="flex gap-3">
                                <button class="flex-1 bg-[#282828] text-white py-3 rounded-lg font-semibold hover:bg-[#383838] transition-colors">
                                    <i class="fab fa-twitter mr-2"></i>Twitter
                                </button>
                                
                                <button class="flex-1 bg-[#282828] text-white py-3 rounded-lg font-semibold hover:bg-[#383838] transition-colors">
                                    <i class="fab fa-telegram mr-2"></i>Telegram
                                </button>
                                
                                <button class="flex-1 bg-[#282828] text-white py-3 rounded-lg font-semibold hover:bg-[#383838] transition-colors">
                                    <i class="fab fa-whatsapp mr-2"></i>WhatsApp
                                </button>
                            </div>
                        </div>

                        <!-- 佣金等级 -->
                        <div class="bg-[#181818] rounded-lg p-6">
                            <h2 class="text-xl font-bold mb-4">佣金等级</h2>
                            
                            <div class="space-y-4">
                                <div class="flex items-center gap-4 p-4 bg-[#242424] rounded-lg opacity-50">
                                    <div class="w-12 h-12 bg-gray-600 rounded-full flex items-center justify-center">
                                        <span class="font-bold">S</span>
                                    </div>
                                    
                                    <div class="flex-1">
                                        <h3 class="font-bold">Starter</h3>
                                        <p class="text-sm text-[#b3b3b3]">0 推荐</p>
                                    </div>
                                    
                                    <div class="text-right">
                                        <div class="text-2xl font-bold">2%</div>
                                        <div class="text-xs text-[#666]">佣金比例</div>
                                    </div>
                                </div>

                                <div class="flex items-center gap-4 p-4 bg-[#1DB954]/20 rounded-lg border-2 border-[#1DB954]">
                                    <div class="w-12 h-12 bg-[#1DB954] rounded-full flex items-center justify-center">
                                        <span class="font-bold text-black">P</span>
                                    </div>
                                    
                                    <div class="flex-1">
                                        <h3 class="font-bold">Pro</h3>
                                        <p class="text-sm text-[#b3b3b3]">10+ 推荐</p>
                                    </div>
                                    
                                    <div class="text-right">
                                        <div class="text-2xl font-bold text-[#1DB954]">3%</div>
                                        <div class="text-xs text-[#666]">当前等级</div>
                                    </div>
                                </div>

                                <div class="flex items-center gap-4 p-4 bg-[#242424] rounded-lg">
                                    <div class="w-12 h-12 bg-gradient-to-br from-yellow-400 to-orange-500 rounded-full flex items-center justify-center">
                                        <span class="font-bold">E</span>
                                    </div>
                                    
                                    <div class="flex-1">
                                        <h3 class="font-bold">Elite</h3>
                                        <p class="text-sm text-[#b3b3b3]">50+ 推荐</p>
                                    </div>
                                    
                                    <div class="text-right">
                                        <div class="text-2xl font-bold">5%</div>
                                        <div class="text-xs text-[#666]">下一等级</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧推荐记录 -->
                    <div class="lg:col-span-1">
                        <div class="bg-[#181818] rounded-lg p-6 sticky top-6">
                            <h3 class="font-bold mb-4">最近推荐</h3>
                            
                            <div class="space-y-4">
                                <div class="flex items-center gap-3 pb-4 border-b border-[#282828]">
                                    <div class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-sm">李</div>
                                    
                                    <div class="flex-1">
                                        <div class="font-semibold text-sm">李小白</div>
                                        <div class="text-xs text-[#666]">2025-03-01</div>
                                    </div>
                                    
                                    <div class="text-[#1DB954] font-semibold text-sm">+$45</div>
                                </div>

                                <div class="flex items-center gap-3 pb-4 border-b border-[#282828]">
                                    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-sm">王</div>
                                    
                                    <div class="flex-1">
                                        <div class="font-semibold text-sm">王大伟</div>
                                        <div class="text-xs text-[#666]">2025-02-28</div>
                                    </div>
                                    
                                    <div class="text-[#1DB954] font-semibold text-sm">+$120</div>
                                </div>

                                <div class="flex items-center gap-3 pb-4 border-b border-[#282828]">
                                    <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-sm">张</div>
                                    
                                    <div class="flex-1">
                                        <div class="font-semibold text-sm">张小明</div>
                                        <div class="text-xs text-[#666]">2025-02-25</div>
                                    </div>
                                    
                                    <div class="text-[#1DB954] font-semibold text-sm">+$80</div>
                                </div>

                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center text-sm">刘</div>
                                    
                                    <div class="flex-1">
                                        <div class="font-semibold text-sm">刘芳</div>
                                        <div class="text-xs text-[#666]">2025-02-20</div>
                                    </div>
                                    
                                    <div class="text-[#1DB954] font-semibold text-sm">+$200</div>
                                </div>
                            </div>

                            <button class="w-full mt-6 bg-[#282828] text-white py-3 rounded-lg font-semibold hover:bg-[#383838] transition-colors">
                                查看全部记录
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText('https://xmusic.finance/r/ABC123XYZ');
            alert('推荐链接已复制！');
        }

        // 货币切换
        function showCurrencyModal() {
            document.getElementById('currencyModal').classList.remove('hidden');
            document.getElementById('currencyModal').classList.add('flex');
            updateCurrencyUI();
        }

        function closeCurrencyModal() {
            document.getElementById('currencyModal').classList.add('hidden');
            document.getElementById('currencyModal').classList.remove('flex');
        }

        function setCurrency(currency) {
            localStorage.setItem('xmusic-currency', currency);
            document.getElementById('currentCurrency').textContent = currency;
            updateCurrencyUI();
            closeCurrencyModal();
        }

        function updateCurrencyUI() {
            const current = localStorage.getItem('xmusic-currency') || 'USD';
            document.querySelectorAll('.currency-btn').forEach(btn => {
                if (btn.dataset.currency === current) {
                    btn.classList.remove('bg-[#282828]', 'text-white');
                    btn.classList.add('bg-[#1DB954]', 'text-black');
                } else {
                    btn.classList.remove('bg-[#1DB954]', 'text-black');
                    btn.classList.add('bg-[#282828]', 'text-white');
                }
            });
        }

        // 语言切换
        function showLangModal() {
            document.getElementById('langModal').classList.remove('hidden');
            document.getElementById('langModal').classList.add('flex');
            updateLangUI();
        }

        function closeLangModal() {
            document.getElementById('langModal').classList.add('hidden');
            document.getElementById('langModal').classList.remove('flex');
        }

        function setLanguage(lang) {
            localStorage.setItem('xmusic-lang', lang);
            updateLangUI();
            closeLangModal();
            // 刷新页面以应用语言
            window.location.reload();
        }

        function updateLangUI() {
            const current = localStorage.getItem('xmusic-lang') || 'zh';
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.dataset.lang === current) {
                    btn.classList.remove('bg-[#282828]', 'text-white');
                    btn.classList.add('bg-[#1DB954]', 'text-black');
                } else {
                    btn.classList.remove('bg-[#1DB954]', 'text-black');
                    btn.classList.add('bg-[#282828]', 'text-white');
                }
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            const savedCurrency = localStorage.getItem('xmusic-currency') || 'USD';
            document.getElementById('currentCurrency').textContent = savedCurrency;
        });
    </script>
</body>
</html>
