<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发起融资 - X-Music-Brand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">
    <header class="sticky top-0 z-40 bg-[#0a0a0a]/95 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5">
                    <i class="fas fa-arrow-left text-white/70"></i>
                </button>
                <span class="text-lg font-bold">发起融资</span>
            </div>
        </div>
    </header>

    <main class="flex-1 px-4 py-4">
        <div class="mb-6">
            <h2 class="text-xl font-bold mb-2">创建新项目</h2>
            <p class="text-sm text-white/50">填写项目信息开始融资</p>
        </div>

        <form class="space-y-5">
            <div>
                <label class="text-sm text-white/70 mb-2 block">项目标题</label>
                <input type="text" placeholder="例如：2025全国巡演计划" class="w-full bg-white/5 border border-white/10 text-white px-4 py-4 rounded-xl focus:border-[#4ade80] focus:outline-none">
            </div>

            <div>
                <label class="text-sm text-white/70 mb-2 block">融资目标 (USD)</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-white/50">$</span>
                    <input type="number" placeholder="10000" class="w-full bg-white/5 border border-white/10 text-white pl-10 pr-4 py-4 rounded-xl focus:border-[#4ade80] focus:outline-none">
                </div>
            </div>

            <div>
                <label class="text-sm text-white/70 mb-2 block">项目简介</label>
                <textarea placeholder="介绍您的音乐项目..." rows="4" class="w-full bg-white/5 border border-white/10 text-white px-4 py-4 rounded-xl resize-none focus:border-[#4ade80] focus:outline-none"></textarea>
            </div>

            <button type="submit" class="w-full py-4 bg-gradient-to-r from-[#4ade80] to-[#22c55e] text-black rounded-xl font-bold text-lg">
                提交审核
            </button>
        </form>
    </main>
</body>
</html>
