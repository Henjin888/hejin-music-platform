<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>项目详情 - X-Music-Brand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'xm-bg': '#0a0a0a',
                        'xm-card': '#1a1a1a',
                        'xm-green': '#4ade80',
                        'xm-green-dark': '#22c55e',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: white; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-btn.active { color: #4ade80; border-bottom-color: #4ade80; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #4ade80, #22c55e); border-radius: 999px; }
    </style>
</head>
<body class="min-h-screen pb-24">
    <header class="fixed top-0 left-0 right-0 z-40 bg-gradient-to-b from-black/80 to-transparent">
        <div class="flex items-center justify-between px-4 py-3">
            <button onclick="history.back()" class="w-10 h-10 flex items-center justify-center rounded-full bg-black/50 backdrop-blur">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="flex items-center gap-2">
                <button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/50 backdrop-blur">
                    <i class="far fa-heart"></i>
                </button>
                <button class="w-10 h-10 flex items-center justify-center rounded-full bg-black/50 backdrop-blur">
                    <i class="fas fa-share-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="relative h-72">
            <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=800&h=600&fit=crop" alt="" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0a] via-transparent to-transparent"></div>
            <div class="absolute bottom-0 left-0 right-0 p-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-[10px] bg-xm-green text-black px-2 py-0.5 rounded-full font-bold">进行中</span>
                    <span class="text-[10px] bg-white/20 text-white px-2 py-0.5 rounded-full">Indie Folk</span>
                </div>
                <h1 class="text-2xl font-bold mb-1">City Echo</h1>
                <p class="text-sm text-white/70">My First Studio EP</p>
            </div>
        </div>

        <div class="px-4 py-4 border-b border-white/10">
            <div class="flex items-end justify-between mb-2">
                <div>
                    <div class="text-xs text-white/50 mb-1">已筹集</div>
                    <div class="text-2xl font-bold text-xm-green">$7,850</div>
                </div>
                <div class="text-right">
                    <div class="text-xs text-white/50 mb-1">目标</div>
                    <div class="text-lg font-bold">$10,000</div>
                </div>
            </div>
            <div class="progress-bar h-3 mb-3">
                <div class="progress-fill h-full" style="width: 78%"></div>
            </div>
            <div class="flex items-center justify-between text-sm">
                <span class="text-white/50"><i class="fas fa-users mr-1"></i> 82 位投资人</span>
                <span class="text-white/50"><i class="fas fa-clock mr-1"></i> 剩余 15 天</span>
            </div>
        </div>

        <div class="sticky top-0 bg-[#0a0a0a]/95 backdrop-blur-md z-30 border-b border-white/10">
            <div class="flex">
                <button class="tab-btn active flex-1 py-3 text-sm font-medium border-b-2 border-transparent" onclick="switchTab('overview')">概览</button>
                <button class="tab-btn flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-white/50" onclick="switchTab('details')">详情</button>
                <button class="tab-btn flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-white/50" onclick="switchTab('updates')">动态</button>
            </div>
        </div>

        <div class="px-4 py-4">
            <div id="overview" class="tab-content active">
                <div class="flex items-center gap-4 mb-6">
                    <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=100&h=100&fit=crop" alt="" class="w-16 h-16 rounded-full object-cover">
                    <div class="flex-1">
                        <div class="font-bold">Alex</div>
                        <div class="text-sm text-white/50">独立音乐人</div>
                    </div>
                    <button class="px-4 py-2 bg-white/10 rounded-full text-sm font-medium">关注</button>
                </div>

                <div class="mb-6">
                    <h3 class="font-bold mb-3">项目介绍</h3>
                    <p class="text-sm text-white/70 leading-relaxed">这是我首张录音室 EP《City Echo》，融合了独立民谣和电子元素。</p>
                </div>

                <div class="bg-xm-green/10 rounded-2xl p-4 border border-xm-green/20">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <div class="text-xs text-white/50">预期年化回报</div>
                            <div class="text-2xl font-bold text-xm-green">15-25%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/95 backdrop-blur-md border-t border-white/10 safe-bottom z-40">
        <div class="flex items-center gap-3 px-4 py-3">
            <div class="flex-1">
                <div class="text-xs text-white/50">最低投资 $10</div>
                <div class="text-lg font-bold text-xm-green">预期回报 15-25%</div>
            </div>
            <button class="px-8 py-3 bg-gradient-to-r from-xm-green to-xm-green-dark text-black rounded-xl font-bold">立即投资</button>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('text-white/50');
            });
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            event.target.classList.remove('text-white/50');
        }
    </script>
</body>
</html>
