<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>我的投资 - X-Music-Brand</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'xm-bg': '#0a0a0a',
                        'xm-card': '#1a1a1a',
                        'xm-green': '#4ade80',
                        'xm-green-dark': '#22c55e',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: white; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #4ade80, #22c55e); border-radius: 999px; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <header class="sticky top-0 z-40 bg-[#0a0a0a]/95 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center justify-between px-4 py-3">
            <span class="text-lg font-bold">我的投资</span>
            <button class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5">
                <i class="fas fa-cog text-white/70"></i>
            </button>
        </div>
    </header>

    <main class="px-4 py-4">
        <!-- Portfolio Summary -->
        <div class="bg-gradient-to-r from-[#1a472a] to-[#0d2818] rounded-2xl p-4 mb-6 border border-[#4ade80]/20">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <div class="text-sm text-white/70 mb-1">总投资金额</div>
                    <div class="text-2xl font-bold">$12,500</div>
                </div>
                <div class="text-right">
                    <div class="text-sm text-white/70 mb-1">累计收益</div>
                    <div class="text-2xl font-bold text-[#4ade80]">+$1,250</div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs bg-[#4ade80]/20 text-[#4ade80] px-2 py-1 rounded-full">+10% 收益率</span>
                <span class="text-xs text-white/50">投资 8 个项目</span>
            </div>
        </div>

        <!-- Investment List -->
        <div class="mb-4">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold">我的投资项目</h2>
                <a href="#" class="text-sm text-[#4ade80]">查看全部</a>
            </div>

            <div class="space-y-3">
                <!-- Investment 1 -->
                <a href="project.html?id=1" class="block bg-[#1a1a1a] rounded-2xl p-4 border border-white/5">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=100&h=100&fit=crop" alt="" class="w-12 h-12 rounded-xl object-cover">
                        <div class="flex-1">
                            <div class="font-bold">Alex</div>
                            <div class="text-xs text-white/50">City Echo EP</div>
                        </div>
                        <span class="text-xs bg-[#4ade80]/20 text-[#4ade80] px-2 py-1 rounded-full">进行中</span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-white/50">投资金额</span>
                        <span class="font-medium">$500</span>
                    </div>
                    <div class="flex items-center justify-between text-sm mt-1">
                        <span class="text-white/50">预期回报</span>
                        <span class="text-[#4ade80]">15-25%</span>
                    </div>
                </a>

                <!-- Investment 2 -->
                <a href="project.html?id=2" class="block bg-[#1a1a1a] rounded-2xl p-4 border border-white/5">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=100&h=100&fit=crop" alt="" class="w-12 h-12 rounded-xl object-cover">
                        <div class="flex-1">
                            <div class="font-bold">Luna</div>
                            <div class="text-xs text-white/50">Deep Sea Album</div>
                        </div>
                        <span class="text-xs bg-white/10 text-white/70 px-2 py-1 rounded-full">已结束</span>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <span class="text-white/50">投资金额</span>
                        <span class="font-medium">$300</span>
                    </div>
                    <div class="flex items-center justify-between text-sm mt-1">
                        <span class="text-white/50">实际回报</span>
                        <span class="text-[#4ade80]">+22% 🎉</span>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0a0a0a]/95 backdrop-blur-xl border-t border-white/5 safe-bottom z-50">
        <div class="flex items-center justify-around py-2">
            <a href="index.html" class="flex flex-col items-center gap-1 py-2 px-4 text-white/50">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px]">首页</span>
            </a>
            <a href="explore.html" class="flex flex-col items-center gap-1 py-2 px-4 text-white/50">
                <i class="fas fa-compass text-lg"></i>
                <span class="text-[10px]">探索</span>
            </a>
            <a href="create.html" class="flex flex-col items-center -mt-6">
                <div class="w-14 h-14 bg-gradient-to-r from-[#4ade80] to-[#22c55e] rounded-full flex items-center justify-center">
                    <i class="fas fa-plus text-black text-xl"></i>
                </div>
                <span class="text-[10px] text-white/50 mt-1">发起</span>
            </a>
            <a href="dashboard.html" class="flex flex-col items-center gap-1 py-2 px-4 text-[#4ade80]">
                <i class="fas fa-chart-pie text-lg"></i>
                <span class="text-[10px]">投资</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center gap-1 py-2 px-4 text-white/50">
                <i class="fas fa-user text-lg"></i>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </nav>
</body>
</html>
