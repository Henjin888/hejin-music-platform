    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #1db954, #1ed760);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .selectors {
            display: flex;
            gap: 10px;
        }
        .selector-btn {
            background: #181818;
            border: 1px solid #282828;
            color: #fff;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .selector-btn:hover { background: #282828; }
        .dropdown {
            position: absolute;
            top: 60px;
            right: 20px;
            background: #181818;
            border-radius: 12px;
            padding: 10px;
            min-width: 300px;
            max-height: 600px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 9999;
        }
        .dropdown.show { display: block; }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .dropdown-item:hover { background: #282828; }
        .flag { font-size: 24px; width: 32px; text-align: center; }
        .code { font-weight: 600; min-width: 50px; }
        .name { font-size: 13px; color: #b3b3b3; flex: 1; }
        .symbol { color: #1db954; font-weight: 500; }
        .count-header {
            padding: 15px;
            text-align: center;
            color: #1db954;
            font-size: 14px;
            border-bottom: 1px solid #282828;
            margin-bottom: 10px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: #181818;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .card-image {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            margin-bottom: 15px;
            position: relative;
        }
        .price-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #1db954;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        .card h3 { margin-bottom: 8px; }
        .card p { color: #b3b3b3; font-size: 14px; }
    </style>

        const songs = [
            { title: "夜曲", artist: "周杰伦" },
            { title: "Shape of You", artist: "Ed Sheeran" },
            { title: "Lemon", artist: "米津玄師" },

        ];

        function init() {
            renderCurrencies();
            renderSongs();
        }

        function renderCurrencies() {
            const dropdown = document.getElementById('currency-dropdown');
            const count = Object.keys(currencies).length;
            let html = `<div class="count-header">🌍 ${count} 种货币</div>`;
            
            for (const [code, curr] of Object.entries(currencies)) {
                html += `
                    <div class="dropdown-item" onclick="selectCurrency('${code}')">
                        <span class="flag">${curr.flag}</span>
                        <span class="code">${curr.code}</span>
                        <span class="name">${curr.name}</span>
                        <span class="symbol">${curr.symbol}</span>
                    </div>
                `;
            }
            dropdown.innerHTML = html;
        }

        function renderSongs() {
            const container = document.getElementById('song-cards');
            const curr = currencies[currentCurrency];
            const price = (0.99 * curr.rate).toFixed(2);
            
            container.innerHTML = songs.map(song => `
                <div class="card">
                    <div class="card-image">
                        <div class="price-tag">${curr.symbol}${price}</div>
                    </div>
                    <h3>${song.title}</h3>
                    <p>${song.artist}</p>
                </div>
            `).join('');
        }

        function toggleCurrency() {
            document.getElementById('currency-dropdown').classList.toggle('show');
        }

        function selectCurrency(code) {
            currentCurrency = code;
            const curr = currencies[code];
            document.getElementById('curr-symbol').textContent = curr.symbol;
            document.getElementById('curr-code').textContent = curr.code;
            document.getElementById('currency-dropdown').classList.remove('show');
            renderSongs();
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.selectors')) {
                document.getElementById('currency-dropdown').classList.remove('show');
            }
        });

        init();
