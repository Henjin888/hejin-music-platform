<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">XMUSIC - 全球音乐平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1db954;
            --primary-dark: #1ed760;
            --bg-dark: #121212;
            --bg-card: #181818;
            --bg-hover: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --sidebar-width: 240px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .app {
            display: flex;
            min-height: 100vh;
        }
        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            background: #000;
            padding: 24px 16px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 0 12px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -1px;
        }
        .nav-section {
            margin-bottom: 24px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            font-size: 14px;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        /* 主内容区 */
        .main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 24px 32px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .selectors {
            display: flex;
            gap: 10px;
        }
        .selector-btn {
            background: var(--bg-card);
            border: 1px solid var(--bg-hover);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .selector-btn:hover { background: var(--bg-hover); }
        .dropdown {
            position: absolute;
            top: 70px;
            right: 32px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 10px;
            min-width: 320px;
            max-height: 600px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 9999;
        }
        .dropdown.show { display: block; }
        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        .dropdown-item:hover { background: var(--bg-hover); }
        .flag { font-size: 20px; width: 28px; text-align: center; }
        .code { font-weight: 600; min-width: 50px; }
        .name { font-size: 13px; color: var(--text-secondary); flex: 1; }
        .symbol { color: var(--primary); font-weight: 500; }
        .count-header {
            padding: 15px;
            text-align: center;
            color: var(--primary);
            font-size: 14px;
            border-bottom: 1px solid var(--bg-hover);
            margin-bottom: 10px;
        }
        /* 页面内容 */
        .page { display: none; }
        .page.active { display: block; }
        .page-header {
            margin-bottom: 30px;
        }
        .page-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .page-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }
        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }
        .card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .card:hover {
            background: var(--bg-hover);
            transform: translateY(-4px);
        }
        .card-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            margin-bottom: 16px;
            position: relative;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        .price-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-artist {
            font-size: 14px;
            color: var(--text-secondary);
        }
        /* 搜索框 */
        .search-box {
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 44px;
            border: none;
            border-radius: 25px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        /* 设置页面 */
        .settings-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .settings-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--bg-hover);
        }
        .settings-item:last-child {
            border-bottom: none;
        }
        .settings-label {
            display: flex;
            flex-direction: column;
        }
        .settings-label span:first-child {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .settings-label span:last-child {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .settings-value {
            color: var(--primary);
            font-weight: 500;
        }
        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
        }
    </style>
</head>

            </div>

                </div>
                <div class="search-box" style="margin-bottom: 30px;">

                           onkeyup="performSearch(this.value)" data-i18n-placeholder="search.placeholder">
                </div>
                <div id="search-results">
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p data-i18n="search.empty">输入关键词开始搜索</p>
                    </div>
                </div>
            </div>

            <!-- 音乐库 -->
            <div class="page" id="page-library">
                <div class="page-header">
                    <h1 class="page-title" data-i18n="library.title">音乐库</h1>
                    <p class="page-subtitle" data-i18n="library.subtitle">你收藏的所有音乐</p>
                </div>
                <div class="card-grid" id="library-songs"></div>
            </div>

            <!-- 喜欢的歌曲 -->
            <div class="page" id="page-liked">
                <div class="page-header">
                    <h1 class="page-title" data-i18n="liked.title">喜欢的歌曲</h1>
                    <p class="page-subtitle" data-i18n="liked.subtitle">你标记为喜欢的音乐</p>
                </div>
                <div id="liked-songs">
                    <div class="empty-state">
                        <div class="empty-state-icon">❤️</div>
                        <p data-i18n="liked.empty">还没有喜欢的歌曲</p>
                    </div>
                </div>
            </div>

            <!-- 设置页 -->

                <div class="page-header">
                    <h1 class="page-title" data-i18n="settings.title">设置</h1>
                    <p class="page-subtitle" data-i18n="settings.subtitle">管理你的账户和应用偏好</p>
                </div>

                    <div class="settings-item">

                        </div>
                        <div class="settings-value" id="settings-lang">中文</div>
                    </div>
                </div>

                    <div class="settings-item">
                        <div class="settings-label">
                            <span data-i18n="settings.displayCurrency">显示货币</span>

                        </div>

                        </div>
                        <div class="settings-value" data-i18n="settings.manage">管理</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

            },
            id: {
                name: 'Bahasa Indonesia',
                flag: '🇮🇩',
                nav: { home: '🏠 Beranda', search: '🔍 Cari', library: '📚 Perpustakaan', liked: '❤️ Disukai', settings: '⚙️ Pengaturan' },
                home: { title: 'Unggulan', subtitle: 'Musik populer global' },
                search: { title: 'Cari', placeholder: 'Cari lagu, artis...', empty: 'Ketik untuk mencari', noResults: 'Tidak ada lagu ditemukan' },
                library: { title: 'Perpustakaan', subtitle: 'Semua musik tersimpan' },
                liked: { title: 'Disukai', subtitle: 'Musik yang ditandai suka', empty: 'Belum ada yang disukai' },
                settings: { title: 'Pengaturan', subtitle: 'Kelola akun dan preferensi', language: 'Bahasa', interfaceLanguage: 'Bahasa antarmuka', languageDesc: 'Pilih bahasa tampilan', currency: 'Mata Uang', displayCurrency: 'Mata uang tampilan', currencyDesc: 'Pilih mata uang untuk harga', account: 'Akun', premium: 'Anggota XMUSIC Premium', manage: 'Kelola' }
            },
            ms: {
                name: 'Bahasa Melayu',
                flag: '🇲🇾',
                nav: { home: '🏠 Laman Utama', search: '🔍 Cari', library: '📚 Perpustakaan', liked: '❤️ Suka', settings: '⚙️ Tetapan' },
                home: { title: 'Pilihan', subtitle: 'Muzik popular global' },
                search: { title: 'Cari', placeholder: 'Cari lagu, artis...', empty: 'Taip untuk mencari', noResults: 'Tiada lagu dijumpai' },
                library: { title: 'Perpustakaan', subtitle: 'Semua muzik tersimpan' },
                liked: { title: 'Suka', subtitle: 'Muzik yang ditanda suka', empty: 'Tiada lagu suka' },
                settings: { title: 'Tetapan', subtitle: 'Urus akaun dan keutamaan', language: 'Bahasa', interfaceLanguage: 'Bahasa antaramuka', languageDesc: 'Pilih bahasa paparan', currency: 'Mata Wang', displayCurrency: 'Mata wang paparan', currencyDesc: 'Pilih mata wang untuk harga', account: 'Akaun', premium: 'Ahli XMUSIC Premium', manage: 'Urus' }
            },
            sv: {
                name: 'Svenska',
                flag: '🇸🇪',
                nav: { home: '🏠 Hem', search: '🔍 Sök', library: '📚 Bibliotek', liked: '❤️ Gillade', settings: '⚙️ Inställningar' },
                home: { title: 'Utvalda', subtitle: 'Global populärmusik' },
                search: { title: 'Sök', placeholder: 'Sök låtar, artister...', empty: 'Skriv för att söka', noResults: 'Inga låtar hittades' },
                library: { title: 'Bibliotek', subtitle: 'All din sparade musik' },
                liked: { title: 'Gillade', subtitle: 'Musik markerad som favorit', empty: 'Inga gillade låtar' },
                settings: { title: 'Inställningar', subtitle: 'Hantera konto och preferenser', language: 'Språk', interfaceLanguage: 'Gränssnittsspråk', languageDesc: 'Välj önskat språk', currency: 'Valuta', displayCurrency: 'Visningsvaluta', currencyDesc: 'Välj valuta för priser', account: 'Konto', premium: 'XMUSIC Premium-medlem', manage: 'Hantera' }
            }
        };

        let currentLang = 'zh';
        let currentCurrency = 'CNY';

        const allSongs = [
            { id: 1, title: "夜曲", artist: "周杰伦", album: "十一月的萧邦", cover: "linear-gradient(135deg, #667eea, #764ba2)" },
            { id: 2, title: "晴天", artist: "周杰伦", album: "叶惠美", cover: "linear-gradient(135deg, #f093fb, #f5576c)" },
            { id: 3, title: "Shape of You", artist: "Ed Sheeran", album: "Divide", cover: "linear-gradient(135deg, #4facfe, #00f2fe)" },
            { id: 4, title: "Blinding Lights", artist: "The Weeknd", album: "After Hours", cover: "linear-gradient(135deg, #43e97b, #38f9d7)" },
            { id: 5, title: "Lemon", artist: "米津玄師", album: "Lemon", cover: "linear-gradient(135deg, #fa709a, #fee140)" },
            { id: 6, title: "Dynamite", artist: "BTS", album: "BE", cover: "linear-gradient(135deg, #30cfd0, #330867)" },
            { id: 7, title: "Despacito", artist: "Luis Fonsi", album: "Despacito", cover: "linear-gradient(135deg, #a8edea, #fed6e3)" },
            { id: 8, title: "Dernière Danse", artist: "Indila", album: "Mini World", cover: "linear-gradient(135deg, #ffecd2, #fcb69f)" }
        ];

        function init() {
            renderLanguages();
            renderCurrencies();
            updateLanguageUI();
            renderSongs();
        }

        function renderLanguages() {
            const dropdown = document.getElementById('language-dropdown');
            let html = `<div class="count-header">🌍 ${Object.keys(i18n).length} 种语言</div>`;
            
            for (const [code, lang] of Object.entries(i18n)) {
                html += `
                    <div class="dropdown-item" onclick="selectLanguage('${code}')">
                        <span class="flag">${lang.flag}</span>
                        <span class="code">${code.toUpperCase()}</span>
                        <span class="name">${lang.name}</span>
                    </div>
                `;
            }
            dropdown.innerHTML = html;
        }

        function renderCurrencies() {
            const dropdown = document.getElementById('currency-dropdown');
            const count = Object.keys(currencies).length;
            let html = `<div class="count-header">💰 ${count} 种货币</div>`;
            
            for (const [code, curr] of Object.entries(currencies)) {
                html += `
                    <div class="dropdown-item" onclick="selectCurrency('${code}')">
                        <span class="flag">${curr.flag}</span>
                        <span class="code">${curr.code}</span>
                        <span class="name">${curr.name}</span>
                        <span class="symbol">${curr.symbol}</span>
                    </div>
                `;
            }
            dropdown.innerHTML = html;
        }

        function selectLanguage(code) {
            currentLang = code;
            const lang = i18n[code];
            
            document.getElementById('lang-flag').textContent = lang.flag;
            document.getElementById('lang-name').textContent = lang.name;
            document.getElementById('settings-lang').textContent = lang.name;
            document.getElementById('language-dropdown').classList.remove('show');
            
            updateLanguageUI();
        }

        function updateLanguageUI() {
            const t = i18n[currentLang];
            
            // 更新页面标题
            document.getElementById('page-title').textContent = `XMUSIC - ${t.nav.home.replace('🏠 ', '')}`;
            
            // 更新所有 data-i18n 元素
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const value = getNestedValue(t, key);
                if (value) el.textContent = value;
            });
            
            // 更新 placeholder
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                const value = getNestedValue(t, key);
                if (value) el.placeholder = value;
            });
            
            // 更新导航
            document.querySelectorAll('.nav-item').forEach(item => {
                const navKey = item.getAttribute('data-nav');
                if (navKey && t.nav[navKey]) {
                    item.querySelector('span:last-child').textContent = t.nav[navKey];
                }
            });
        }

        function getNestedValue(obj, path) {
            return path.split('.').reduce((o, p) => o && o[p], obj);
        }

        function selectCurrency(code) {
            currentCurrency = code;
            const curr = currencies[code];
            
            document.getElementById('curr-symbol').textContent = curr.symbol;
            document.getElementById('curr-code').textContent = curr.code;
            document.getElementById('settings-currency').textContent = `${curr.code} ${curr.symbol}`;
            document.getElementById('currency-dropdown').classList.remove('show');
            
            renderSongs();
        }

        function renderSongs() {
            const curr = currencies[currentCurrency];
            const price = (0.99 * curr.rate).toFixed(2);
            
            // 首页歌曲
            document.getElementById('home-songs').innerHTML = allSongs.slice(0, 4).map(song => `
                <div class="card">
                    <div class="card-image" style="background: ${song.cover}">
                        <div class="price-tag">${curr.symbol}${price}</div>
                    </div>
                    <div class="card-title">${song.title}</div>
                    <div class="card-artist">${song.artist}</div>
                </div>
            `).join('');
            
            // 音乐库歌曲
            document.getElementById('library-songs').innerHTML = allSongs.map(song => `
                <div class="card">
                    <div class="card-image" style="background: ${song.cover}">
                        <div class="price-tag">${curr.symbol}${price}</div>
                    </div>
                    <div class="card-title">${song.title}</div>
                    <div class="card-artist">${song.artist}</div>
                </div>
            `).join('');
        }

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(`page-${page}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function toggleDropdown(type) {
            const currencyDropdown = document.getElementById('currency-dropdown');
            const languageDropdown = document.getElementById('language-dropdown');
            
            if (type === 'currency') {
                currencyDropdown.classList.toggle('show');
                languageDropdown.classList.remove('show');
            } else {
                languageDropdown.classList.toggle('show');
                currencyDropdown.classList.remove('show');
            }
        }

        function performSearch(query) {
            const resultsContainer = document.getElementById('search-results');
            
            if (!query) {
                const t = i18n[currentLang];
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <p>${t.search.empty}</p>
                    </div>
                `;
                return;
            }
            
            const results = allSongs.filter(s => 
                s.title.toLowerCase().includes(query.toLowerCase()) ||
                s.artist.toLowerCase().includes(query.toLowerCase())
            );
            
            const curr = currencies[currentCurrency];
            const price = (0.99 * curr.rate).toFixed(2);
            
            if (results.length === 0) {
                const t = i18n[currentLang];
                resultsContainer.innerHTML = `<div class="empty-state"><div class="empty-state-icon">😕</div><p>${t.search.noResults || 'No results found'}</p></div>`;
            } else {
                resultsContainer.innerHTML = `<div class="card-grid">${results.map(song => `
                    <div class="card">
                        <div class="card-image" style="background: ${song.cover}">
                            <div class="price-tag">${curr.symbol}${price}</div>
                        </div>
                        <div class="card-title">${song.title}</div>
                        <div class="card-artist">${song.artist}</div>
                    </div>
                `).join('')}</div>`;
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.selectors')) {
                document.getElementById('currency-dropdown').classList.remove('show');
                document.getElementById('language-dropdown').classList.remove('show');
            }
        });

        init();
    </script>
</body>
