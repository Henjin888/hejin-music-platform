<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">XMUSIC - 在线音乐平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1db954;
            --primary-dark: #1ed760;
            --bg-dark: #121212;
            --bg-card: #181818;
            --bg-hover: #282828;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --sidebar-width: 240px;
            --player-height: 90px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'Noto Sans JP', 'Noto Sans KR', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 语言选择器 */
        .lang-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        
        /* 货币选择器 */
        .currency-selector {
            position: relative;
        }
        
        .currency-btn {
            background: var(--bg-card);
            border: 1px solid var(--bg-hover);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        .currency-btn:hover {
            background: var(--bg-hover);
            transform: scale(1.05);
        }
        
        .currency-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 10px;
            min-width: 320px;
            max-height: 500px;
            overflow-y: scroll;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 9999;
        }
        
        .currency-dropdown::-webkit-scrollbar {
            width: 8px;
        }
        
        .currency-dropdown::-webkit-scrollbar-track {
            background: var(--bg-hover);
            border-radius: 4px;
        }
        
        .currency-dropdown::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        .currency-dropdown.show {
            display: block;
        }
        
        .currency-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .currency-option:hover {
            background: var(--bg-hover);
        }
        
        .currency-flag {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }
        
        .currency-code {
            font-weight: 600;
            min-width: 50px;
        }
        
        .currency-name {
            font-size: 13px;
            color: var(--text-secondary);
            flex: 1;
        }
        
        .currency-rate {
            font-size: 12px;
            color: var(--primary);
            font-weight: 500;
        }
        
        /* 价格标签 */
        .price-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(29, 185, 84, 0.4);
        }
        
        .subscription-banner {
            background: linear-gradient(90deg, #667eea, #764ba2);
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .subscription-info h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .subscription-info p {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        .subscription-price {
            text-align: right;
        }
        
        .price-amount {
            font-size: 32px;
            font-weight: bold;
        }
        
        .price-period {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }
        
        .subscribe-btn {
            background: var(--text-primary);
            color: var(--bg-dark);
            border: none;
            padding: 12px 32px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        
        .subscribe-btn:hover {
            transform: scale(1.05);
            background: var(--primary);
            color: var(--text-primary);
        }
        
        .lang-btn {
            background: var(--bg-card);
            border: 1px solid var(--bg-hover);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .lang-btn:hover {
            background: var(--bg-hover);
            transform: scale(1.05);
        }
        
        .lang-dropdown {
            position: absolute;
            top: 50px;
            right: 0;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 10px;
            min-width: 200px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .lang-dropdown.show {
            display: block;
        }
        
        .lang-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .lang-option:hover {
            background: var(--bg-hover);
        }
        
        .lang-flag {
            font-size: 20px;
            width: 28px;
            text-align: center;
        }
        
        .lang-name {
            font-size: 14px;
        }
        
        .lang-native {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: auto;
        }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: #000;
            padding: 24px 16px;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding: 0 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -1px;
        }
        
        .nav-section {
            margin-bottom: 24px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .nav-item:hover, .nav-item.active {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        
        .nav-item i {
            font-size: 24px;
            width: 24px;
            text-align: center;
        }
        
        /* 主内容区 */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 24px 32px;
            padding-bottom: calc(var(--player-height) + 40px);
        }
        
        /* 顶部栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-right: 200px;
        }
        
        .search-box {
            position: relative;
            width: 400px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 44px;
            border: none;
            border-radius: 25px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }
        
        .search-box input:focus {
            background: var(--bg-hover);
            box-shadow: 0 0 0 2px var(--primary);
        }
        
        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        /* 内容区块 */
        .section {
            margin-bottom: 40px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: bold;
        }
        
        .see-all {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .see-all:hover {
            text-decoration: underline;
        }
        
        /* 卡片网格 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }
        
        .music-card {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .music-card:hover {
            background: var(--bg-hover);
            transform: translateY(-4px);
        }
        
        .music-card:hover .play-button {
            opacity: 1;
            transform: translateY(0);
        }
        
        .card-image {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            background: linear-gradient(135deg, #333, #555);
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .play-button {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        
        .play-button:hover {
            transform: scale(1.1);
            background: var(--primary-dark);
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 播放器 */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--player-height);
            background: var(--bg-card);
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 200;
        }
        
        .player-left {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 30%;
            min-width: 200px;
        }
        
        .player-cover {
            width: 56px;
            height: 56px;
            border-radius: 4px;
            background: linear-gradient(135deg, #333, #555);
        }
        
        .player-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .player-title {
            font-size: 14px;
            font-weight: 500;
        }
        
        .player-artist {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .player-like {
            margin-left: auto;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
        }
        
        .player-like:hover {
            color: var(--primary);
        }
        
        .player-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            max-width: 40%;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .control-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .control-btn:hover {
            color: var(--text-primary);
        }
        
        .control-btn.play {
            width: 40px;
            height: 40px;
            background: var(--text-primary);
            color: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .control-btn.play:hover {
            transform: scale(1.1);
        }
        
        .progress-bar {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .time {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: center;
        }
        
        .progress-track {
            flex: 1;
            height: 4px;
            background: #4d4d4d;
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--text-primary);
            border-radius: 2px;
            width: 30%;
            position: relative;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: var(--text-primary);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .progress-track:hover .progress-fill::after {
            opacity: 1;
        }
        
        .player-right {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 30%;
            min-width: 200px;
            justify-content: flex-end;
        }
        
        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 136px;
        }
        
        .volume-slider {
            flex: 1;
            height: 4px;
            background: #4d4d4d;
            border-radius: 2px;
            cursor: pointer;
        }
        
        .volume-fill {
            height: 100%;
            background: var(--text-primary);
            border-radius: 2px;
            width: 70%;
        }
        
        /* 歌词面板 */
        .lyrics-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background: var(--bg-dark);
            z-index: 300;
            transition: right 0.3s;
            padding: 24px;
            overflow-y: auto;
        }
        
        .lyrics-panel.open {
            right: 0;
        }
        
        .lyrics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .lyrics-line {
            padding: 12px 0;
            color: var(--text-secondary);
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .lyrics-line.active {
            color: var(--primary);
            font-size: 20px;
            font-weight: 600;
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .sidebar {
                width: 72px;
            }
            .logo-text, .nav-item span {
                display: none;
            }
            .main-content {
                margin-left: 72px;
            }
            .search-box {
                width: 300px;
            }
            .lang-selector {
                right: 10px;
                top: 10px;
            }
        }
        
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .main-content {
                margin-left: 0;
                padding-top: 60px;
            }
            .player-left, .player-right {
                display: none;
            }
            .player-center {
                max-width: 100%;
            }
            .search-box {
                width: 200px;
            }
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .top-bar {
                padding-right: 0;
            }
            .lang-selector {
                position: fixed;
                top: auto;
                bottom: 100px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 语言和货币选择器 -->
    <div class="lang-selector">
        <div class="currency-selector">
            <button class="currency-btn" onclick="toggleCurrencyDropdown()">
                <span id="current-currency-symbol">¥</span>
                <span id="current-currency-code">CNY</span>
                <span>▼</span>
            </button>
            <div class="currency-dropdown" id="currency-dropdown">
                <!-- 货币选项由JS生成 -->
            </div>
        </div>
        
        <div class="language-selector">
            <button class="lang-btn" onclick="toggleLangDropdown()">
                <span id="current-lang-flag">🇨🇳</span>
                <span id="current-lang-name">中文</span>
                <span>▼</span>
            </button>
            <div class="lang-dropdown" id="lang-dropdown">
                <!-- 语言选项将由JS生成 -->
            </div>
        </div>
    </div>

    <!-- 侧边栏 -->
    <nav class="sidebar">
        <div class="logo">
            <div class="logo-icon">🎵</div>
            <span class="logo-text">XMUSIC</span>
        </div>
        
        <div class="nav-section">
            <a href="#" class="nav-item active" onclick="showSection('home')">
                <i>🏠</i>
                <span data-i18n="nav.home">首页</span>
            </a>
            <a href="#" class="nav-item" onclick="showSection('search')">
                <i>🔍</i>
                <span data-i18n="nav.search">搜索</span>
            </a>
            <a href="#" class="nav-item" onclick="showSection('library')">
                <i>📚</i>
                <span data-i18n="nav.library">音乐库</span>
            </a>
        </div>
        
        <div class="nav-section">
            <a href="#" class="nav-item" onclick="showSection('playlist')">
                <i>➕</i>
                <span data-i18n="nav.createPlaylist">创建歌单</span>
            </a>
            <a href="#" class="nav-item" onclick="showSection('liked')">
                <i>❤️</i>
                <span data-i18n="nav.likedSongs">喜欢的歌曲</span>
            </a>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="top-bar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索歌曲、艺人、专辑..." onkeyup="searchMusic(this.value)">
            </div>
            
            <div class="user-menu">
                <span style="color: var(--text-secondary); font-size: 14px;">Henjin888</span>
                <div class="user-avatar">H</div>
            </div>
        </div>

        <!-- 首页内容 -->
        <div id="home-section">
            <!-- 订阅横幅 -->
            <div class="subscription-banner">
                <div class="subscription-info">
                    <h3 data-i18n="subscription.title">🎵 XMUSIC Premium</h3>
                    <p data-i18n="subscription.description">无限畅听，无广告，离线播放，高品质音质</p>
                </div>
                <div class="subscription-price">
                    <div class="price-amount" id="subscription-price">¥6.99</div>
                    <div class="price-period" data-i18n="subscription.period">/ 月</div>
                    <button class="subscribe-btn" data-i18n="subscription.button">立即订阅</button>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title" data-i18n="sections.trending">🔥 热门推荐</h2>
                    <a href="#" class="see-all" data-i18n="common.seeAll">显示全部</a>
                </div>
                <div class="card-grid" id="trending-grid"></div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title" data-i18n="sections.foryou">🎸 为你打造</h2>
                    <a href="#" class="see-all" data-i18n="common.seeAll">显示全部</a>
                </div>
                <div class="card-grid" id="foryou-grid"></div>
            </div>

            <div class="section">
                <div class="section-header">
                    <h2 class="section-title" data-i18n="sections.newReleases">🆕 最新发行</h2>
                    <a href="#" class="see-all" data-i18n="common.seeAll">显示全部</a>
                </div>
                <div class="card-grid" id="new-grid"></div>
            </div>
        </div>

        <!-- 搜索结果 -->
        <div id="search-section" style="display: none;">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title" data-i18n="sections.searchResults">🔍 搜索结果</h2>
                </div>
                <div class="card-grid" id="search-results">
                    <p style="color: var(--text-secondary);" data-i18n="search.startTyping">输入关键词开始搜索...</p>
                </div>
            </div>
        </div>

        <!-- 音乐库 -->
        <div id="library-section" style="display: none;">
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title" data-i18n="sections.yourLibrary">📚 你的音乐库</h2>
                </div>
                <div class="card-grid" id="library-grid"></div>
            </div>
        </div>
    </main>

    <!-- 播放器 -->
    <div class="player">
        <div class="player-left">
            <div class="player-cover" id="player-cover"></div>
            <div class="player-info">
                <div class="player-title" id="player-title" data-i18n="player.selectSong">选择一首歌曲</div>
                <div class="player-artist" id="player-artist">-</div>
            </div>
            <div class="player-like" onclick="toggleLike()">🤍</div>
        </div>

        <div class="player-center">
            <div class="player-controls">

        let currentSong = null;

        // 初始化语言选择器
        function initLangSelector() {
            const dropdown = document.getElementById('lang-dropdown');
            let html = '';
            
            for (const [code, lang] of Object.entries(i18n)) {
                html += `
                    <div class="lang-option" onclick="changeLang('${code}')">
                        <span class="lang-flag">${lang.flag}</span>
                        <span class="lang-name">${lang.name}</span>
                        <span class="lang-native">${lang.native}</span>
                    </div>
                `;
            }
            dropdown.innerHTML = html;
        }

        // 切换语言
        function changeLang(langCode) {
            currentLang = langCode;
            const lang = i18n[langCode];
            
            document.getElementById('current-lang-flag').textContent = lang.flag;
            document.getElementById('current-lang-name').textContent = lang.name;
            document.getElementById('lang-dropdown').classList.remove('show');
            
            // 更新所有文本
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                const keys = key.split('.');
                let value = lang;
                for (const k of keys) {
                    value = value[k];
                }
                if (value) el.textContent = value;
            });
            
            // 更新搜索框placeholder
            document.getElementById('search-input').placeholder = lang.search.placeholder;
            
            // 更新页面标题
            document.getElementById('page-title').textContent = `XMUSIC - ${lang.nav.home.replace('🏠 ', '')}`;
            
            // 更新订阅价格显示（带货币）
            updateSubscriptionPrice();
            
            // 重新渲染歌曲
            init();
        }

        // 切换语言下拉
        function toggleLangDropdown() {
            document.getElementById('lang-dropdown').classList.toggle('show');
        }

        // 获取当前语言歌曲
        function getSongs() {
            return songs[currentLang] || songs.zh;
        }

        // 初始化
        function init() {
            const songList = getSongs();
            renderCards('trending-grid', songList.slice(0, 4));
            renderCards('foryou-grid', songList.slice(0, 4));
            renderCards('new-grid', songList.slice(0, 4));
            renderCards('library-grid', songList);
        }

        // 渲染卡片
        function renderCards(gridId, songList) {
            const grid = document.getElementById(gridId);
            if (!songList || songList.length === 0) {
                grid.innerHTML = `<p style="color: var(--text-secondary);">${i18n[currentLang].search.noResults}</p>`;
                return;
            }
            const price = getLocalizedPrice(0.99);
            grid.innerHTML = songList.map(song => `
                <div class="music-card" onclick="playSong(${song.id})">
                    <div class="card-image" style="background: ${song.cover}">
                        <span class="price-tag">${price}</span>
                        <div class="play-button">▶️</div>
                    </div>
                    <div class="card-title">${song.title}</div>
                    <div class="card-subtitle">${song.artist}</div>
                </div>
            `).join('');
        }

        // 播放歌曲
        function playSong(id) {
            const songList = getSongs();
            currentSong = songList.find(s => s.id === id);
            if (currentSong) {
                document.getElementById('player-title').textContent = currentSong.title;
                document.getElementById('player-artist').textContent = currentSong.artist;
                document.getElementById('player-cover').style.background = currentSong.cover;
                document.getElementById('total-time').textContent = currentSong.duration;
                isPlaying = true;
                updatePlayButton();
                startProgress();
            }
        }

        // 播放/暂停
        function togglePlay() {
            if (!currentSong) {
                const songList = getSongs();
                if (songList.length > 0) playSong(songList[0].id);
                return;
            }
            isPlaying = !isPlaying;
            updatePlayButton();
            if (isPlaying) {
                startProgress();
            } else {
                clearInterval(playInterval);
            }
        }

        // 更新播放按钮
        function updatePlayButton() {
            document.getElementById('play-btn').textContent = isPlaying ? '⏸️' : '▶️';
        }

        // 进度条
        function startProgress() {
            clearInterval(playInterval);
            playInterval = setInterval(() => {
                currentTime++;
                const totalSeconds = parseDuration(currentSong.duration);
                const progress = (currentTime / totalSeconds) * 100;
                document.getElementById('progress-fill').style.width = progress + '%';
                document.getElementById('current-time').textContent = formatTime(currentTime);
                
                if (currentTime >= totalSeconds) {
                    nextSong();
                }
            }, 1000);
        }

        // 上一首/下一首
        function prevSong() {
            if (currentSong) {
                const songList = getSongs();
                const index = songList.findIndex(s => s.id === currentSong.id);
                const prevIndex = index > 0 ? index - 1 : songList.length - 1;
                playSong(songList[prevIndex].id);
            }
        }

        function nextSong() {
            if (currentSong) {
                const songList = getSongs();
                const index = songList.findIndex(s => s.id === currentSong.id);
                const nextIndex = index < songList.length - 1 ? index + 1 : 0;
                playSong(songList[nextIndex].id);
            }
        }

        // 进度跳转
        function seek(event) {
            if (!currentSong) return;
            const track = event.currentTarget;
            const rect = track.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            const totalSeconds = parseDuration(currentSong.duration);
            currentTime = Math.floor(percent * totalSeconds);
            document.getElementById('progress-fill').style.width = (percent * 100) + '%';
            document.getElementById('current-time').textContent = formatTime(currentTime);
        }

        // 音量控制
        function setVolume(event) {
            const slider = event.currentTarget;
            const rect = slider.getBoundingClientRect();
            const percent = (event.clientX - rect.left) / rect.width;
            document.getElementById('volume-fill').style.width = (percent * 100) + '%';
        }

        // 搜索
        function searchMusic(query) {
            if (!query) {
                showSection('home');
                return;
            }
            showSection('search');
            const songList = getSongs();
            const results = songList.filter(s => 
                s.title.toLowerCase().includes(query.toLowerCase()) ||
                s.artist.toLowerCase().includes(query.toLowerCase())
            );
            const grid = document.getElementById('search-results');
            if (results.length === 0) {
                grid.innerHTML = `<p style="color: var(--text-secondary);">${i18n[currentLang].search.noResults}</p>`;
            } else {
                renderCards('search-results', results);
            }
        }

        // 切换页面
        function showSection(section) {
            document.getElementById('home-section').style.display = 'none';
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('library-section').style.display = 'none';
            
            if (section === 'home') {
                document.getElementById('home-section').style.display = 'block';
            } else if (section === 'search') {
                document.getElementById('search-section').style.display = 'block';
            } else if (section === 'library' || section === 'playlist' || section === 'liked') {
                document.getElementById('library-section').style.display = 'block';
            }
            
            // 更新导航状态
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (event && event.target) {
                event.target.closest('.nav-item').classList.add('active');
            }
        }

        // 歌词面板
        function toggleLyrics() {
            document.getElementById('lyrics-panel').classList.toggle('open');
        }

        // 喜欢
        function toggleLike() {
            const like = document.querySelector('.player-like');
            like.textContent = like.textContent === '🤍' ? '❤️' : '🤍';
        }

        // 工具函数
        function parseDuration(duration) {
            const [min, sec] = duration.split(':').map(Number);
            return min * 60 + sec;
        }

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        // 点击外部关闭语言下拉
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.lang-selector')) {
                document.getElementById('lang-dropdown').classList.remove('show');
            }
        });

        // 启动
        initLangSelector();
        initCurrencySelector();
        updateSubscriptionPrice();
        init();
    </script>
</body>
</html>
