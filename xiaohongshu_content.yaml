  # 贴文4：故事向（高共鸣）
  - id: post_004
    title: "那个在洛杉矶地下室写歌的女孩，现在怎么样了"
    content: |
      那个在洛杉矶地下室写歌的女孩，现在怎么样了
      
      3年前，我在一个地下室的open mic遇到她
      破旧的吉他，颤抖的声音
      但歌词里有光
      
      她说她从俄亥俄州来
      睡在朋友家的沙发上
      白天在餐厅打工
      晚上写歌到3点
      
      我给了她一张名片
      说："有demo了发我"
      
      半年后，她发来3首歌
      我听完直接飞到洛杉矶
      
      现在
      她的歌在Spotify有500万播放
      下个月要在The Troubadour演出
      
      这就是我为什么相信
      才华永远值得被看见
      
      如果你也在某个地下室写歌
      如果你也相信你的声音值得被听到
      
      📮 xiao2240275008@gmail.com
      我等你
    tags: ["音乐故事", "洛杉矶音乐", "音乐人成长", "追梦故事", "独立音乐人", "好莱坞音乐"]
