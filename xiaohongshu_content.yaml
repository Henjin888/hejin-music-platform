  # 贴文5：观点向（高讨论）
  - id: post_005
    title: "为什么90%的音乐人赚不到钱｜行业真相"
    content: |
      为什么90%的音乐人赚不到钱｜行业真相
      
      在好莱坞8年，看过太多音乐人起起落落
      说几个残酷的事实：
      
      ❶ 才华只是入场券
      市面上不缺好歌手
      缺的是能把才华变现的能力
      
      ❷ 合同陷阱无处不在
      很多新人被"长期独家"绑死
      歌红了，钱没赚到
      
      ❸ 社交媒体是双刃剑
      不会运营=没有曝光
      但过度运营=失去音乐灵魂
      
      ❹ 合作比单打独斗重要
      一个人的才华有限
      找到对的制作人、编曲、混音
      才能做出好作品
      
      这就是为什么我坚持——
      
      公平的分成
      透明的合作
      尊重创作者
      
      如果你厌倦了被剥削
      如果你想专心做音乐
      
      📮 xiao2240275008@gmail.com
      我们聊聊
