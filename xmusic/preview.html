<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XMUSIC - 项目预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #121212;
            color: #fff;
            line-height: 1.6;
        }
        
        .header {
            background: #070707;
            border-bottom: 1px solid #282828;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: #1DB954;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: bold;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #B3B3B3;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #1DB954;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 40px;
            height: calc(100vh - 140px);
        }
        
        .sidebar {
            background: #181818;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
        }
        
        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #B3B3B3;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        
        .page-list {
            list-style: none;
        }
        
        .page-list li {
            margin-bottom: 8px;
        }
        
        .page-list a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #B3B3B3;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .page-list a:hover,
        .page-list a.active {
            background: #282828;
            color: #fff;
        }
        
        .page-list a.active {
            border-left: 3px solid #1DB954;
        }
        
        .page-icon {
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            background: #181818;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .toolbar {
            background: #070707;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #282828;
        }
        
        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .device-toggle {
            display: flex;
            background: #282828;
            border-radius: 8px;
            padding: 4px;
        }
        
        .device-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: #B3B3B3;
            cursor: pointer;
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .device-btn.active {
            background: #404040;
            color: #fff;
        }
        
        .url-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #282828;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #B3B3B3;
        }
        
        .url-bar input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            width: 300px;
        }
        
        .preview-frame {
            flex: 1;
            position: relative;
            background: #121212;
        }
        
        .preview-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .info-panel {
            background: #070707;
            border-top: 1px solid #282828;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .info-label {
            font-size: 12px;
            color: #B3B3B3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-value {
            font-size: 18px;
            font-weight: bold;
            color: #1DB954;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #282828;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #1DB954;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            background: #1DB954;
            color: #000;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .badge.warning {
            background: #FFA500;
        }
        
        .badge.error {
            background: #E22134;
            color: #fff;
        }
        
        @media (max-width: 1024px) {
            .preview-grid {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🎵</div>
            <div class="logo-text">XMUSIC 项目预览</div>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            <span>开发中 - 最后更新: 2026-02-24 16:00</span>
        </div>
    </header>
    
    <div class="container">
        <div class="preview-grid">
            <aside class="sidebar">
                <h3>页面导航</h3>
                <ul class="page-list">
                    <li>
                        <a href="http://localhost:3000" target="preview-frame" class="active">
                            <span class="page-icon">🏠</span>
                            首页
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/explore" target="preview-frame">
                            <span class="page-icon">🔍</span>
                            探索
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/artist/1" target="preview-frame">
                            <span class="page-icon">🎤</span>
                            歌手主页
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/project/1" target="preview-frame">
                            <span class="page-icon">📋</span>
                            项目详情
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/dashboard" target="preview-frame">
                            <span class="page-icon">📊</span>
                            投资面板
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/create" target="preview-frame">
                            <span class="page-icon">➕</span>
                            创建项目
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/login" target="preview-frame">
                            <span class="page-icon">🔑</span>
                            登录
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/blog" target="preview-frame">
                            <span class="page-icon">📝</span>
                            博客
                        </a>
                    </li>
                    <li>
                        <a href="http://localhost:3000/cookie-policy" target="preview-frame">
                            <span class="page-icon">🍪</span>
                            Cookie政策
                        </a>
                    </li>
                </ul>
                
                <h3 style="margin-top: 32px;">开发文档</h3>
                <ul class="page-list">
                    <li>
                        <a href="#" onclick="alert('请查看 FUNCTIONS.md')">
                            <span class="page-icon">📄</span>
                            功能清单
                        </a>
                    </li>
                    <li>
                        <a href="#" onclick="alert('请查看 DEVELOPMENT.md')">
                            <span class="page-icon">🔧</span>
                            开发文档
                        </a>
                    </li>
                </ul>
            </aside>
            
            <main class="main-content">
                <div class="toolbar">
                    <div class="toolbar-left">
                        <div class="device-toggle">
                            <button class="device-btn active">💻 桌面</button>
                            <button class="device-btn">📱 手机</button>
                        </div>
                        <div class="url-bar">
                            <span>🌐</span>
                            <input type="text" value="http://localhost:3000" readonly>
                        </div>
                    </div>
                    <div class="badge">✅ 构建成功</div>
                </div>
                
                <div class="preview-frame">
                    <iframe name="preview-frame" src="http://localhost:3000"></iframe>
                </div>
                
                <div class="info-panel">
                    <div class="info-item">
                        <span class="info-label">页面完成度</span>
                        <span class="info-value">85%</span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 85%"></div>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">功能模块</span>
                        <span class="info-value">9/10</span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 90%"></div>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">合约开发</span>
                        <span class="info-value">30%</span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 30%"></div>
                        </div>
                    </div>
                    <div class="info-item">
                        <span class="info-label">待修复问题</span>
                        <span class="info-value">3</span>
                        <span style="font-size: 12px; color: #B3B3B3;">搜索优化/合约部署/测试</span>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script>
        // 页面切换高亮
        document.querySelectorAll('.page-list a').forEach(link => {
            link.addEventListener('click', function() {
                document.querySelectorAll('.page-list a').forEach(a => a.classList.remove('active'));
                this.classList.add('active');
            });
        });
        
        // 设备切换
        document.querySelectorAll('.device-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const iframe = document.querySelector('iframe');
                if (this.textContent.includes('手机')) {
                    iframe.style.maxWidth = '375px';
                    iframe.style.margin = '0 auto';
                } else {
                    iframe.style.maxWidth = '100%';
                }
            });
        });
    </script>
</body>
</html>
