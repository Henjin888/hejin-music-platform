<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资面板 - XMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .tab-active { background-color: #282828; color: white; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#000000] text-white overflow-hidden">
    <div class="flex h-screen">
        <!-- 左侧导航栏 -->
        <aside class="w-64 bg-[#000000] flex flex-col p-6 gap-6">
            <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-[#1DB954] rounded-full flex items-center justify-center">
                    <i class="fas fa-music text-black text-lg"></i>
                </div>
                <span class="text-2xl font-bold">XMUSIC</span>
            </div>

            <nav class="flex flex-col gap-2">
                <a href="index.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">
                    <i class="fas fa-home text-xl w-6"></i>
                    <span>首页</span>
                </a>
                <a href="discover.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">
                    <i class="fas fa-compass text-xl w-6"></i>
                    <span>发现</span>
                </a>
                <a href="map.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">
                    <i class="fas fa-map-marker-alt text-xl w-6"></i>
                    <span>附近音乐人</span>
                </a>
            </nav>

            <div class="h-px bg-[#282828]"></div>

            <nav class="flex flex-col gap-2">
                <a href="dashboard.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-white font-semibold transition-colors bg-[#282828]">
                    <i class="fas fa-book text-xl w-6"></i>
                    <span>我的投资</span>
                </a>
                <a href="create.html" class="sidebar-item flex items-center gap-4 px-4 py-3 rounded-lg text-[#b3b3b3] font-semibold transition-colors hover:text-white">
                    <i class="fas fa-plus-circle text-xl w-6"></i>
                    <span>发起融资</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-1 bg-[#121212] rounded-lg m-2 overflow-hidden flex flex-col">
            <!-- 顶部栏 -->
            <header class="flex items-center justify-between px-8 py-4 bg-[#070707]">
                <h1 class="text-2xl font-bold">投资面板</h1>
                
                <button onclick="window.location.href='login.html'" class="bg-[#1DB954] text-black px-6 py-2 rounded-full font-bold hover:scale-105 transition-transform">
                    连接钱包
                </button>
            </header>

            <!-- 可滚动内容 -->
            <div class="flex-1 overflow-y-auto scrollbar-hide px-8 py-8">
                
                <!-- 统计卡片 -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                    <div class="bg-[#181818] rounded-lg p-6">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 bg-[#1DB954]/20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-wallet text-[#1DB954]"></i>
                            </div>
                            <span class="text-[#b3b3b3] text-sm">总投资额</span>
                        </div>
                        <div class="text-2xl font-bold">$12,500</div>
                    </div>

                    <div class="bg-[#181818] rounded-lg p-6">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 bg-cyan-500/20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-chart-line text-cyan-400"></i>
                            </div>
                            <span class="text-[#b3b3b3] text-sm">累计收益</span>
                        </div>
                        <div class="text-2xl font-bold text-cyan-400">+$850</div>
                    </div>

                    <div class="bg-[#181818] rounded-lg p-6">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-compact-disc text-purple-400"></i>
                            </div>
                            <span class="text-[#b3b3b3] text-sm">活跃项目</span>
                        </div>
                        <div class="text-2xl font-bold">3</div>
                    </div>

                    <div class="bg-[#181818] rounded-lg p-6">
                        <div class="flex items-center gap-3 mb-2">
                            <div class="w-10 h-10 bg-amber-500/20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-coins text-amber-400"></i>
                            </div>
                            <span class="text-[#b3b3b3] text-sm">待领取</span>
                        </div>
                        <div class="text-2xl font-bold text-amber-400">$120</div>
                    </div>
                </div>

                <div class="grid lg:grid-cols-3 gap-8">
                    <!-- 左侧主要内容 -->
                    <div class="lg:col-span-2">
                        <!-- Tabs -->
                        <div class="bg-[#282828] rounded-lg p-1 flex gap-1 mb-6">
                            <button class="tab-active flex-1 py-2 px-4 rounded-md font-semibold text-sm">我的投资</button>
                            <button class="flex-1 py-2 px-4 rounded-md font-semibold text-sm text-[#b3b3b3] hover:text-white">交易记录</button>
                            <button class="flex-1 py-2 px-4 rounded-md font-semibold text-sm text-[#b3b3b3] hover:text-white">治理投票</button>
                        </div>

                        <!-- 投资项目列表 -->
                        <div class="space-y-4">
                            <!-- 项目 1 -->
                            <div class="bg-[#181818] rounded-lg p-6">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-blue-600 rounded-lg flex items-center justify-center text-3xl">🎵</div>
                                        <div>
                                            <h3 class="font-bold text-lg">林夕的2025巡演计划</h3>
                                            <div class="flex items-center gap-2 mt-1">
                                                <span class="bg-[#1DB954]/20 text-[#1DB954] px-2 py-0.5 rounded text-xs">进行中</span>
                                                <span class="text-[#b3b3b3] text-sm">10,000 份额</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="text-right">
                                        <div class="text-[#b3b3b3] text-sm">已投资</div>
                                        <div class="text-xl font-bold">$5,000</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <div class="flex justify-between text-sm mb-2">
                                        <span class="text-[#b3b3b3]">项目进度</span>
                                        <span class="font-semibold">65%</span>
                                    </div>
                                    <div class="h-2 bg-[#282828] rounded-full overflow-hidden">
                                        <div class="h-full bg-[#1DB954] rounded-full" style="width: 65%"></div>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between pt-4 border-t border-[#282828]">
                                    <div>
                                        <div class="text-[#b3b3b3] text-sm">累计收益</div>
                                        <div class="text-[#1DB954] font-semibold">+$350</div>
                                    </div>
                                    
                                    <div class="flex gap-2">
                                        <button class="bg-[#282828] text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-[#383838] transition-colors">
                                            查看详情
                                        </button>
                                        
                                        <button onclick="claimReward(1)" class="bg-[#1DB954] text-black px-4 py-2 rounded-full text-sm font-semibold hover:opacity-90 transition-opacity">
                                            领取收益
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- 项目 2 -->
                            <div class="bg-[#181818] rounded-lg p-6">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-16 h-16 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-lg flex items-center justify-center text-3xl">🎹</div>
                                        <div>
                                            <h3 class="font-bold text-lg">新专辑《午夜飞行》</h3>
                                            <div class="flex items-center gap-2 mt-1">
                                                <span class="bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded text-xs">已完成</span>
                                                <span class="text-[#b3b3b3] text-sm">6,000 份额</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="text-right">
                                        <div class="text-[#b3b3b3] text-sm">已投资</div>
                                        <div class="text-xl font-bold">$3,000</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <div class="flex justify-between text-sm mb-2">
                                        <span class="text-[#b3b3b3]">项目进度</span>
                                        <span class="font-semibold">100%</span>
                                    </div>
                                    <div class="h-2 bg-[#282828] rounded-full overflow-hidden">
                                        <div class="h-full bg-blue-500 rounded-full" style="width: 100%"></div>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between pt-4 border-t border-[#282828]">
                                    <div>
                                        <div class="text-[#b3b3b3] text-sm">累计收益</div>
                                        <div class="text-cyan-400 font-semibold">+$280</div>
                                    </div>
                                    
                                    <button class="bg-[#282828] text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-[#383838] transition-colors">
                                        查看详情
                                    </button>
                                </div>
                            </div>

                            <!-- 项目 3 -->
                            <div class="bg-[#181818] rounded-lg p-6">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex items-center gap-4">
                                        <div class="w-16 h-16 bg-gradient-to-br from-orange-600 to-red-600 rounded-lg flex items-center justify-center text-3xl">🎤</div>
                                        <div>
                                            <h3 class="font-bold text-lg">地下说唱联盟</h3>
                                            <div class="flex items-center gap-2 mt-1">
                                                <span class="bg-[#1DB954]/20 text-[#1DB954] px-2 py-0.5 rounded text-xs">进行中</span>
                                                <span class="text-[#b3b3b3] text-sm">9,000 份额</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="text-right">
                                        <div class="text-[#b3b3b3] text-sm">已投资</div>
                                        <div class="text-xl font-bold">$4,500</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <div class="flex justify-between text-sm mb-2">
                                        <span class="text-[#b3b3b3]">项目进度</span>
                                        <span class="font-semibold">42%</span>
                                    </div>
                                    <div class="h-2 bg-[#282828] rounded-full overflow-hidden">
                                        <div class="h-full bg-[#1DB954] rounded-full" style="width: 42%"></div>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between pt-4 border-t border-[#282828]">
                                    <div>
                                        <div class="text-[#b3b3b3] text-sm">累计收益</div>
                                        <div class="text-[#1DB954] font-semibold">+$220</div>
                                    </div>
                                    
                                    <div class="flex gap-2">
                                        <button class="bg-[#282828] text-white px-4 py-2 rounded-full text-sm font-semibold hover:bg-[#383838] transition-colors">
                                            查看详情
                                        </button>
                                        
                                        <button onclick="claimReward(3)" class="bg-[#1DB954] text-black px-4 py-2 rounded-full text-sm font-semibold hover:opacity-90 transition-opacity">
                                            领取收益
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 右侧快速操作 -->
                    <div class="lg:col-span-1">
                        <div class="bg-[#181818] rounded-lg p-6 sticky top-6">
                            <h3 class="font-bold mb-6">快速操作</h3>
                            
                            <div class="space-y-3">
                                <button onclick="claimAllRewards()" class="w-full bg-[#1DB954] text-black font-bold py-3 rounded-full hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                                    <i class="fas fa-coins"></i>
                                    领取全部收益 ($120)
                                </button>

                                <div class="h-px bg-[#282828] my-4"></div>

                                <button class="w-full bg-[#282828] text-white font-semibold py-3 rounded-full hover:bg-[#383838] transition-colors flex items-center justify-center gap-2">
                                    <i class="fas fa-chart-pie"></i>
                                    投资组合分析
                                </button>

                                <button class="w-full bg-[#282828] text-white font-semibold py-3 rounded-full hover:bg-[#383838] transition-colors flex items-center justify-center gap-2">
                                    <i class="fas fa-history"></i>
                                    交易历史
                                </button>

                                <button class="w-full bg-[#282828] text-white font-semibold py-3 rounded-full hover:bg-[#383838] transition-colors flex items-center justify-center gap-2">
                                    <i class="fas fa-cog"></i>
                                    设置
                                </button>

                                <button class="w-full bg-[#282828] text-red-400 font-semibold py-3 rounded-full hover:bg-[#383838] transition-colors flex items-center justify-center gap-2">
                                    <i class="fas fa-sign-out-alt"></i>
                                    断开连接
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function claimReward(projectId) {
            alert(`领取项目 ${projectId} 的收益成功！`);
        }

        function claimAllRewards() {
            alert('领取全部收益成功！共 $120');
        }
    </script>
</body>
</html>
