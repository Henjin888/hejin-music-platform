<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投资面板 - XMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-active { background-color: #282828; color: white; }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    <!-- Header -->
    <header class="border-b border-zinc-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fas fa-music text-emerald-400"></i>
                <span class="font-bold">XMUSIC</span>
            </div>
            <button class="text-white font-medium">连接钱包</button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Dashboard Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-2">投资面板</h1>
            <p class="text-zinc-400">管理你的音乐投资组合</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-emerald-500/20 flex items-center justify-center">
                        <i class="fas fa-wallet text-emerald-400"></i>
                    </div>
                    <div>
                        <p class="text-sm text-zinc-500">总投资额</p>
                        <p class="text-xl font-bold">$12,500</p>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-cyan-500/20 flex items-center justify-center">
                        <i class="fas fa-chart-line text-cyan-400"></i>
                    </div>
                    <div>
                        <p class="text-sm text-zinc-500">累计收益</p>
                        <p class="text-xl font-bold text-cyan-400">+$850</p>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                        <i class="fas fa-compact-disc text-purple-400"></i>
                    </div>
                    <div>
                        <p class="text-sm text-zinc-500">活跃项目</p>
                        <p class="text-xl font-bold">3</p>
                    </div>
                </div>
            </div>

            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-amber-500/20 flex items-center justify-center">
                        <i class="fas fa-dollar-sign text-amber-400"></i>
                    </div>
                    <div>
                        <p class="text-sm text-zinc-500">待领取</p>
                        <p class="text-xl font-bold text-amber-400">$120</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <!-- Main Content -->
            <div class="lg:col-span-2">
                <!-- Tabs -->
                <div class="bg-zinc-900 rounded-lg p-1 flex gap-1 mb-6">
                    <button class="tab-active flex-1 py-2 px-4 rounded-md font-medium text-sm">我的投资</button>
                    <button class="flex-1 py-2 px-4 rounded-md font-medium text-sm text-zinc-400 hover:text-white">交易记录</button>
                    <button class="flex-1 py-2 px-4 rounded-md font-medium text-sm text-zinc-400 hover:text-white">治理投票</button>
                </div>

                <!-- Investments List -->
                <div class="space-y-4">
                    <!-- Investment 1 -->
                    <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg">
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <div>
                                    <h3 class="font-semibold mb-1">林夕的2025巡演计划</h3>
                                    <div class="flex items-center gap-2">
                                        <span class="bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded text-xs">进行中</span>
                                        <span class="text-sm text-zinc-500">10,000 份额</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-sm text-zinc-500">已投资</p>
                                    <p class="font-bold">$5,000</p>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between text-sm">
                                    <span class="text-zinc-500">项目进度</span>
                                    <span class="font-medium">65%</span>
                                </div>
                                <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                                    <div class="h-full bg-emerald-500 rounded-full" style="width: 65%"></div>
                                </div>
                            </div>

                            <div class="flex items-center justify-between mt-4 pt-4 border-t border-zinc-800">
                                <div>
                                    <p class="text-sm text-zinc-500">累计收益</p>
                                    <p class="text-emerald-400 font-medium">+$350</p>
                                </div>
                                <button class="border border-zinc-700 rounded-lg px-4 py-2 text-sm hover:border-zinc-500 transition-colors">
                                    查看详情
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Investment 2 -->
                    <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg">
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <div>
                                    <h3 class="font-semibold mb-1">新专辑《午夜飞行》</h3>
                                    <div class="flex items-center gap-2">
                                        <span class="bg-blue-500/20 text-blue-400 px-2 py-1 rounded text-xs">已完成</span>
                                        <span class="text-sm text-zinc-500">6,000 份额</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-sm text-zinc-500">已投资</p>
                                    <p class="font-bold">$3,000</p>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between text-sm">
                                    <span class="text-zinc-500">项目进度</span>
                                    <span class="font-medium">100%</span>
                                </div>
                                <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                                    <div class="h-full bg-blue-500 rounded-full" style="width: 100%"></div>
                                </div>
                            </div>

                            <div class="flex items-center justify-between mt-4 pt-4 border-t border-zinc-800">
                                <div>
                                    <p class="text-sm text-zinc-500">累计收益</p>
                                    <p class="text-cyan-400 font-medium">+$280</p>
                                </div>
                                <button class="border border-zinc-700 rounded-lg px-4 py-2 text-sm hover:border-zinc-500 transition-colors">
                                    查看详情
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Investment 3 -->
                    <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg">
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <div>
                                    <h3 class="font-semibold mb-1">地下说唱联盟</h3>
                                    <div class="flex items-center gap-2">
                                        <span class="bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded text-xs">进行中</span>
                                        <span class="text-sm text-zinc-500">9,000 份额</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-sm text-zinc-500">已投资</p>
                                    <p class="font-bold">$4,500</p>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between text-sm">
                                    <span class="text-zinc-500">项目进度</span>
                                    <span class="font-medium">42%</span>
                                </div>
                                <div class="h-2 bg-zinc-800 rounded-full overflow-hidden">
                                    <div class="h-full bg-emerald-500 rounded-full" style="width: 42%"></div>
                                </div>
                            </div>

                            <div class="flex items-center justify-between mt-4 pt-4 border-t border-zinc-800">
                                <div>
                                    <p class="text-sm text-zinc-500">累计收益</p>
                                    <p class="text-emerald-400 font-medium">+$220</p>
                                </div>
                                <button class="border border-zinc-700 rounded-lg px-4 py-2 text-sm hover:border-zinc-500 transition-colors">
                                    查看详情
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-1">
                <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg sticky top-8">
                    <div class="p-6 border-b border-zinc-800">
                        <h3 class="font-bold">快速操作</h3>
                    </div>
                    
                    <div class="p-6 space-y-4">
                        <button class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold rounded-lg py-3 transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-wallet"></i>
                            领取收益 ($120)
                        </button>

                        <hr class="border-zinc-800">

                        <button class="w-full border border-zinc-700 rounded-lg py-3 hover:border-zinc-500 transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-chart-pie"></i>
                            投资组合分析
                        </button>

                        <button class="w-full border border-zinc-700 rounded-lg py-3 hover:border-zinc-500 transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-cog"></i>
                            设置
                        </button>

                        <button class="w-full border border-zinc-700 rounded-lg py-3 text-red-400 hover:border-red-400 transition-colors flex items-center justify-center gap-2">
                            <i class="fas fa-sign-out-alt"></i>
                            断开连接
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
