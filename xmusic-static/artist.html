<!DOCTYPE html>
<html lang="zh-CN">

<body class="dark-bg text-white min-h-screen pb-20">
    <!-- Header -->

            <div class="mt-4 space-y-3">

                    <div class="text-center">

                        <p class="text-xs text-muted">获赞</p>

                </div>

                <!-- Action Buttons -->

                    <button class="flex-1 spotify-bg hover:bg-[#1ED760] text-black font-bold rounded-full py-2 transition-colors">
                        投资支持
                    </button>
                    <button class="flex-1 border border-[#404040] text-white hover:bg-[#282828] rounded-full py-2 transition-colors">
                        关注
                    </button>
                    <button class="border border-[#404040] text-white hover:bg-[#282828] rounded-full p-2">

            </div>

            <div class="space-y-2">
                <div class="flex justify-between text-sm">
                    <span class="text-muted">已融资</span>
                    <span class="font-bold">$32,500 / $50,000</span>

                <div class="h-2 bg-[#404040] rounded-full overflow-hidden">
                    <div class="h-full spotify-bg rounded-full" style="width: 65%"></div>

                    <div class="text-center">
                        <p class="text-xs text-muted">月听众</p>

    </div>

    <!-- Tabs -->
    <div class="mt-6 border-b border-dark">
        <div class="flex">
            <button class="flex-1 flex items-center justify-center gap-2 py-3 text-sm font-medium text-white border-b-2 border-[#1DB954]">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>

            <button class="flex-1 flex items-center justify-center gap-2 py-3 text-sm font-medium text-muted hover:text-white transition-colors">

                音乐

            <button class="flex-1 flex items-center justify-center gap-2 py-3 text-sm font-medium text-muted hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>

                投资人

            <div class="aspect-[3/4] bg-[#282828] relative group cursor-pointer overflow-hidden">
                <div class="absolute inset-0 flex items-center justify-center text-4xl">🎸</div>
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>

                </div>
                <div class="absolute bottom-2 left-2 right-2">
                    <div class="flex items-center gap-1 text-xs text-white">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        2.3M
                    </div>
                </div>
            </div>

            <div class="aspect-[3/4] bg-[#282828] relative group cursor-pointer overflow-hidden">

                        <path d="M8 5v14l11-7z"/>

                <div class="absolute bottom-2 left-2 right-2">

                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
