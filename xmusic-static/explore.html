<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索音乐人 - XMUSIC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .spotify-green { color: #1DB954; }
        .spotify-bg { background-color: #1DB954; }
        .dark-bg { background-color: #121212; }
        .card-bg { background-color: #181818; }
        .border-dark { border-color: #282828; }
        .text-muted { color: #B3B3B3; }
        .text-dim { color: #6A6A6A; }
        .header-bg { background-color: #070707; }
        .play-btn {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s ease;
        }
        .group:hover .play-btn {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="dark-bg text-white min-h-screen">
    <!-- Header -->
    <header class="header-bg border-b border-dark sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center gap-4">
            <a href="index.html" class="text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            
            <div class="flex-1 relative">
                <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="搜索音乐人、项目..." 
                    class="w-full pl-12 pr-4 py-3 bg-[#242424] border-none rounded-full text-white placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-[#1DB954]"
                >
            </div>
            
            <button id="filterBtn" class="text-white p-2 rounded-lg hover:bg-[#282828] transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Filters -->
    <div id="filters" class="bg-[#181818] border-b border-dark py-4 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 space-y-4">
            <div class="flex items-center gap-3 overflow-x-auto pb-2">
                <span class="text-sm text-muted whitespace-nowrap">风格:</span>
                <button class="filter-genre whitespace-nowrap rounded-full px-4 py-1 bg-[#1DB954] text-black text-sm font-medium" data-genre="全部">全部</button>
                <button class="filter-genre whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-genre="独立流行">独立流行</button>
                <button class="filter-genre whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-genre="电子">电子</button>
                <button class="filter-genre whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-genre="说唱">说唱</button>
                <button class="filter-genre whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-genre="民谣">民谣</button>
                <button class="filter-genre whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-genre="摇滚">摇滚</button>
            </div>
            
            <div class="flex items-center gap-3 overflow-x-auto pb-2">
                <span class="text-sm text-muted whitespace-nowrap">地区:</span>
                <button class="filter-location whitespace-nowrap rounded-full px-4 py-1 bg-[#1DB954] text-black text-sm font-medium" data-location="全部">全部</button>
                <button class="filter-location whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-location="北京">北京</button>
                <button class="filter-location whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-location="上海">上海</button>
                <button class="filter-location whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-location="成都">成都</button>
                <button class="filter-location whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-location="杭州">杭州</button>
                <button class="filter-location whitespace-nowrap rounded-full px-4 py-1 text-white hover:bg-[#282828] text-sm" data-location="深圳">深圳</button>
            </div>
        </div>
    </div>

    <!-- Results -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold" id="resultsTitle">探索音乐人</h1>
            <span class="text-muted" id="resultsCount">6 个结果</span>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="artistsGrid">
            <!-- Artists will be rendered here -->
        </div>

        <div id="noResults" class="hidden text-center py-20">
            <svg class="w-16 h-16 text-[#404040] mx-auto mb-4" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
            <h3 class="text-xl font-bold mb-2">未找到结果</h3>
            <p class="text-muted">尝试其他关键词或调整筛选条件</p>
        </div>
    </main>

    <script>
        const artists = [
            {
                id: 1,
                name: "林夕",
                project: "2025巡演计划",
                genre: "独立流行",
                location: "北京",
                image: "🎵",
                gradient: "from-purple-600 to-blue-600",
                target: 50000,
                raised: 32500,
                investors: 128,
                listeners: "45.2K",
                verified: true
            },
            {
                id: 2,
                name: "陈默",
                project: "新专辑《午夜飞行》",
                genre: "电子",
                location: "上海",
                image: "🎹",
                gradient: "from-emerald-600 to-teal-600",
                target: 30000,
                raised: 30000,
                investors: 89,
                listeners: "28.7K",
                verified: true
            },
            {
                id: 3,
                name: "MC 阿龙",
                project: "地下说唱联盟",
                genre: "说唱",
                location: "成都",
                image: "🎤",
                gradient: "from-orange-600 to-red-600",
                target: 20000,
                raised: 8500,
                investors: 45,
                listeners: "12.3K",
                verified: false
            },
            {
                id: 4,
                name: "小雨",
                project: "民谣诗集",
                genre: "民谣",
                location: "杭州",
                image: "🎸",
                gradient: "from-yellow-600 to-orange-600",
                target: 15000,
                raised: 12000,
                investors: 67,
                listeners: "18.5K",
                verified: false
            },
            {
                id: 5,
                name: "DJ Nova",
                project: "电子音乐节",
                genre: "电子",
                location: "深圳",
                image: "🎧",
                gradient: "from-pink-600 to-purple-600",
                target: 40000,
                raised: 28000,
                investors: 95,
                listeners: "32.1K",
                verified: true
            },
            {
                id: 6,
                name: "摇滚老张",
                project: "复出巡演",
                genre: "摇滚",
                location: "北京",
                image: "🎸",
                gradient: "from-red-600 to-pink-600",
                target: 60000,
                raised: 45000,
                investors: 156,
                listeners: "55.8K",
                verified: true
            }
        ];

        let currentGenre = "全部";
        let currentLocation = "全部";
        let searchQuery = "";

        function renderArtists() {
            const filtered = artists.filter(artist => {
                const matchesSearch = searchQuery === "" || 
                    artist.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    artist.project.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesGenre = currentGenre === "全部" || artist.genre === currentGenre;
                const matchesLocation = currentLocation === "全部" || artist.location === currentLocation;
                return matchesSearch && matchesGenre && matchesLocation;
            });

            const grid = document.getElementById('artistsGrid');
            const noResults = document.getElementById('noResults');
            const resultsCount = document.getElementById('resultsCount');
            const resultsTitle = document.getElementById('resultsTitle');

            resultsCount.textContent = `${filtered.length} 个结果`;
            resultsTitle.textContent = searchQuery ? `搜索结果: "${searchQuery}"` : "探索音乐人";

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = filtered.map(artist => `
                <a href="artist.html" class="card-bg rounded-lg p-4 hover:bg-[#282828] transition-all duration-300 group cursor-pointer">
                    <div class="aspect-square rounded-md bg-gradient-to-br ${artist.gradient} mb-4 relative overflow-hidden">
                        <div class="absolute inset-0 flex items-center justify-center text-6xl">${artist.image}</div>
                        <div class="absolute bottom-2 right-2 play-btn">
                            <div class="w-12 h-12 spotify-bg rounded-full flex items-center justify-center shadow-lg">
                                <svg class="w-5 h-5 text-black ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <div class="flex items-center gap-2">
                            <h3 class="font-bold text-white truncate">${artist.name}</h3>
                            ${artist.verified ? `
                            <svg class="w-4 h-4 spotify-green" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                            </svg>
                            ` : ''}
                        </div>
                        <p class="text-sm text-muted truncate">${artist.project}</p>
                        <div class="flex items-center gap-2 text-xs text-dim">
                            <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                            </svg>
                            ${artist.genre}
                            <span>·</span>
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            </svg>
                            ${artist.location}
                        </div>
                        <div class="mt-3 space-y-1">
                            <div class="flex justify-between text-xs">
                                <span class="spotify-green font-medium">$${(artist.raised / 1000).toFixed(1)}K</span>
                                <span class="text-dim">$${(artist.target / 1000).toFixed(0)}K</span>
                            </div>
                            <div class="h-1 bg-[#404040] rounded-full overflow-hidden">
                                <div class="h-full spotify-bg rounded-full" style="width: ${(artist.raised / artist.target * 100).toFixed(0)}%"></div>
                            </div>
                            <div class="flex items-center gap-1 text-xs text-dim">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                                </svg>
                                ${artist.investors} 位投资人
                            </div>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        // Filter toggle
        document.getElementById('filterBtn').addEventListener('click', () => {
            const filters = document.getElementById('filters');
            filters.classList.toggle('hidden');
        });

        // Genre filter
        document.querySelectorAll('.filter-genre').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-genre').forEach(b => {
                    b.classList.remove('bg-[#1DB954]', 'text-black');
                    b.classList.add('text-white');
                });
                e.target.classList.remove('text-white');
                e.target.classList.add('bg-[#1DB954]', 'text-black');
                currentGenre = e.target.dataset.genre;
                renderArtists();
            });
        });

        // Location filter
        document.querySelectorAll('.filter-location').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-location').forEach(b => {
                    b.classList.remove('bg-[#1DB954]', 'text-black');
                    b.classList.add('text-white');
                });
                e.target.classList.remove('text-white');
                e.target.classList.add('bg-[#1DB954]', 'text-black');
                currentLocation = e.target.dataset.location;
                renderArtists();
            });
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderArtists();
        });

        // Initial render
        renderArtists();
    </script>
</body>
</html>
